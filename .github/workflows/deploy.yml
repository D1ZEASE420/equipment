name: Deploy to Zone.ee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          echo "VITE_API_URL=https://api.tak23heinlaid.itmajakas.ee/api" > .env
          npm run build

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H tak23heinlaid.itmajakas.ee >> ~/.ssh/known_hosts
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no virt124154@tak23heinlaid.itmajakas.ee "
            cd ~/domeenid/www.tak23heinlaid.itmajakas.ee/equipment &&
            git pull origin main &&
            cd backend &&
            composer install --no-dev --optimize-autoloader &&
            php artisan config:cache &&
            php artisan route:cache &&
            php artisan migrate --force
          "

      - name: Copy frontend to server
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -r frontend/dist/* virt124154@tak23heinlaid.itmajakas.ee:~/domeenid/www.tak23heinlaid.itmajakas.ee/htdocs/
